name: Bug report
description: Report reproducible incorrect behavior in TinyLLM-System.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private datasets, hostnames, or unsanitized logs.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0-alpha.1 or commit SHA
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: Include the stable error code and a sanitized excerpt.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Use a CPU or minimal GPU fixture where possible.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Sanitized environment
      description: Python, PyTorch, CUDA, GPU model/count, strategy, and config hash.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, private paths, hostnames, and proprietary data.
          required: true

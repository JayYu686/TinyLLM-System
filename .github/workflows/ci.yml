name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements/torch-cpu.txt
      - run: python -m pip install -c requirements/constraints/dev.txt -e ".[dev]"
      - run: make check VENV="$(python -c 'import sys; print(sys.prefix)')"
      - run: pip-audit --skip-editable

  docker:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: tinyllm-system:ci
      - run: docker run --rm tinyllm-system:ci --version

schema_version: "1.0"

run:
  name: tinygpt-debug-fsdp2-nccl-bf16-two-gpu-activation-checkpointing-smoke
  seed: 42

model:
  vocab_size: 64
  hidden_size: 64
  num_layers: 2
  num_heads: 4
  intermediate_size: 128
  max_sequence_length: 32
  rope_theta: 10000.0
  rms_norm_epsilon: 1.0e-6
  dropout: 0.0
  tie_word_embeddings: true

data:
  kind: toy
  vocab_size: 64
  sequence_length: 32
  num_samples: 32

training:
  max_steps: 2
  micro_batch_size: 2
  gradient_accumulation_steps: 1
  learning_rate: 3.0e-4
  weight_decay: 0.01
  max_grad_norm: 1.0
  warmup_steps: 1

precision:
  dtype: bf16
  allow_tf32: true
  use_grad_scaler: false

distributed:
  strategy: fsdp2
  backend: nccl
  device_type: cuda
  world_size: 2
  timeout_seconds: 120
  reshard_after_forward: true
  cpu_offload: false
  activation_checkpointing: true

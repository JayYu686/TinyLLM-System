schema_version: "1.0"

run:
  name: tinygpt-debug-cpu
  seed: 42

model:
  vocab_size: 256
  hidden_size: 192
  num_layers: 4
  num_heads: 6
  intermediate_size: 512
  max_sequence_length: 128
  rope_theta: 10000.0
  rms_norm_epsilon: 1.0e-6
  dropout: 0.0
  tie_word_embeddings: true

data:
  kind: toy
  vocab_size: 256
  sequence_length: 128
  num_samples: 128

training:
  max_steps: 100
  micro_batch_size: 8
  gradient_accumulation_steps: 1
  learning_rate: 3.0e-4
  weight_decay: 0.01
  max_grad_norm: 1.0
  warmup_steps: 10

precision:
  dtype: fp32
  allow_tf32: false
  use_grad_scaler: false

checkpoint:
  output_dir: runs/tinygpt-debug-cpu
  save_steps: 25
  keep_last: 2
  resume: none

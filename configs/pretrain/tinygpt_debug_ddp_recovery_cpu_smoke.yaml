schema_version: "1.0"

run:
  name: tinygpt-debug-ddp-recovery-cpu-smoke
  seed: 42

model:
  vocab_size: 32
  hidden_size: 32
  num_layers: 1
  num_heads: 4
  intermediate_size: 64
  max_sequence_length: 16
  rope_theta: 10000.0
  rms_norm_epsilon: 1.0e-6
  dropout: 0.0
  tie_word_embeddings: true

data:
  kind: toy
  vocab_size: 32
  sequence_length: 16
  num_samples: 64

training:
  max_steps: 6
  micro_batch_size: 4
  gradient_accumulation_steps: 1
  learning_rate: 3.0e-4
  weight_decay: 0.01
  max_grad_norm: 1.0
  warmup_steps: 1

precision:
  dtype: fp32
  allow_tf32: false
  use_grad_scaler: false

checkpoint:
  output_dir: /tmp/tinyllm-ddp-recovery-cpu-smoke
  save_steps: 2
  keep_last: 2
  resume: auto

distributed:
  strategy: ddp
  backend: gloo
  world_size: 2
  timeout_seconds: 60
  broadcast_buffers: false
  find_unused_parameters: false
